<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Contato Acessível</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="container">
        <h1>Formulário de Contato Empresa</h1>

        <form method="post" action="#">
            <fieldset>
                <legend>Dados de contato</legend>

                <div class="campo">
                    <label for="nome">Nome completo</label>
                    <input type="text" id="nome" name="nome" required minlength="3" maxlength="80">
                </div>

                <div class="campo">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="campo">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" required minlength="8" maxlength="20"
                        pattern="(?=.*[A-Za-z])(?=.*\d).{8,20}">

                    <div class="campo senha">
                        <input type="checkbox" id="lembrar senha" name="lembrar_senha" required>
                        <label for="lembrar senha">Lembrar senha</label>

                    </div>

                    <h5>Peguei um regex, vê se funciona, tem que ser de A-Z ou a-z, precisa de número e tem que ser de 8
                        a 20 caracteres</h5>
                </div>

                <div class="campo">
                    <label for="nascimento">Data de nascimento</label>
                    <input type="date" id="nascimento" name="nascimento" required>
                </div>
                <br />
                <fieldset class="grupo-radio">
                    <legend>Assunto</legend>

                    <div class="opcao">
                        <input type="radio" id="duvida" name="assunto" value="duvida" required>
                        <label for="duvida">Dúvida</label>
                    </div>

                    <div class="opcao">
                        <input type="radio" id="suporte" name="assunto" value="suporte">
                        <label for="suporte">Suporte</label>
                    </div>

                    <div class="opcao">
                        <input type="radio" id="feedback" name="assunto" value="feedback">
                        <label for="feedback">Feedback</label>
                    </div>
                </fieldset>

                <div class="campo checkbox">
                    <br />
                    <input type="checkbox" id="termos" name="termos" required>
                    <label for="termos">Li e aceito os termos de uso.</label><br />
                    <a href="#">Blablabla termos de uso</a>

                </div>
                <br />
                <button type="submit">Enviar</button>
            </fieldset>
        </form>
    </main>
</body>

</html>
